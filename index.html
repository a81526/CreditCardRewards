<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>今天刷哪張卡</title>
<meta name="theme-color" content="#ffffff">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <div class="topbar-row">
    <h1 class="app-title">今天刷哪張卡</h1>
    <div class="topbar-actions">
      <button id="menuBtn" class="icon-btn" aria-label="更多" aria-haspopup="menu">⋯</button>
      <div id="menuPanel" class="menu-panel hidden" role="menu">
        <button id="syncMenuBtn" class="menu-item" role="menuitem">
          <span id="syncMenuLabel">☁️ 雲端同步</span>
        </button>
        <button id="exportBtn" class="menu-item" role="menuitem">匯出 JSON</button>
        <button id="importBtn" class="menu-item" role="menuitem">匯入 JSON</button>
        <input type="file" id="importFile" accept="application/json" hidden>
      </div>
    </div>
  </div>

  <div class="search-row">
    <span class="search-icon">⌕</span>
    <input id="searchInput" type="text" placeholder="搜尋銀行、卡片、分類、備註" autocomplete="off" inputmode="search">
    <button id="clearSearchBtn" class="clear-btn hidden" aria-label="清除搜尋">✕</button>
  </div>

  <div class="view-toggle" role="tablist">
    <button class="toggle-btn active" data-view="category" role="tab" aria-selected="true">依分類</button>
    <button class="toggle-btn" data-view="card" role="tab" aria-selected="false">依信用卡</button>
  </div>
</header>

<main id="main">
  <section id="expiringSection" class="expiring-section hidden">
    <div class="expiring-header">
      <span class="expiring-title">⏳ 快到期</span>
      <span id="expiringCount" class="expiring-count"></span>
    </div>
    <div id="expiringList" class="expiring-list"></div>
  </section>

  <div id="listContainer"></div>

  <div id="emptyState" class="empty-state hidden">
    <p class="empty-title">還沒有任何優惠</p>
    <p class="empty-sub">點右下角「+」新增第一筆</p>
  </div>

  <div id="noResultState" class="empty-state hidden">
    <p class="empty-title">找不到符合的結果</p>
    <p class="empty-sub">換個關鍵字試試</p>
  </div>
</main>

<button id="addBtn" class="fab" aria-label="新增優惠">+</button>

<dialog id="offerDialog">
  <form id="offerForm" method="dialog">
    <div class="dialog-header">
      <h2 id="dialogTitle">新增優惠</h2>
      <button type="button" id="closeDialogBtn" class="icon-btn" aria-label="關閉">✕</button>
    </div>

    <div class="dialog-body">
      <input type="hidden" id="offerId">

      <label class="field">
        <span class="field-label">銀行</span>
        <input type="text" id="fieldBank" required placeholder="例：國泰世華">
      </label>

      <label class="field">
        <span class="field-label">信用卡</span>
        <input type="text" id="fieldCard" required placeholder="例：CUBE 卡">
      </label>

      <label class="field">
        <span class="field-label">分類</span>
        <input type="text" id="fieldCategory" required placeholder="例：網購 / 加油 / 餐飲">
      </label>

      <div class="field">
        <span class="field-label">回饋（可新增多筆，例如國內／海外，各自獨立設定）</span>
        <div id="tiersContainer" class="tiers-container"></div>
        <button type="button" id="addTierBtn" class="add-tier-btn">＋ 新增回饋項目</button>
      </div>

      <label class="field">
        <span class="field-label">備註</span>
        <textarea id="fieldNote" rows="2" placeholder="選填"></textarea>
      </label>

      <div class="field-row">
        <label class="field">
          <span class="field-label">開始日期</span>
          <input type="date" id="fieldStartDate" required>
        </label>
        <label class="field">
          <span class="field-label">結束日期</span>
          <input type="date" id="fieldEndDate" required>
        </label>
      </div>

      <label class="checkbox-field">
        <input type="checkbox" id="fieldNeedsRegistration">
        <span>需要登錄</span>
      </label>

      <label class="checkbox-field">
        <input type="checkbox" id="fieldNeedsSwitch">
        <span>需要切換權益</span>
      </label>
    </div>

    <div class="dialog-footer">
      <button type="button" id="cancelBtn" class="btn btn-secondary">取消</button>
      <button type="submit" id="saveBtn" class="btn btn-primary">儲存</button>
    </div>
  </form>
</dialog>

<dialog id="syncDialog">
  <div class="dialog-header">
    <h2>☁️ 雲端同步</h2>
    <button type="button" id="closeSyncDialogBtn" class="icon-btn" aria-label="關閉">✕</button>
  </div>

  <div class="dialog-body">
    <div id="syncStatusBox" class="sync-status-box">
      <p id="syncStatusText" class="sync-status-text">尚未設定同步</p>
    </div>

    <div id="syncNotConnected">
      <p class="sync-desc">要讓手機、電腦看到同一份資料，兩台裝置要用同一組「同步碼」。</p>

      <button type="button" id="generateSyncBtn" class="btn btn-primary" style="width:100%;">
        這是第一台裝置：產生新的同步碼
      </button>

      <p class="sync-desc" style="margin-top:16px;">已經有同步碼了？</p>
      <label class="field">
        <span class="field-label">貼上同步碼</span>
        <input type="text" id="syncKeyInput" placeholder="貼上其他裝置的同步碼" autocomplete="off">
      </label>
      <button type="button" id="connectSyncBtn" class="btn btn-secondary" style="width:100%; margin-top:8px;">
        連接這組同步碼
      </button>
    </div>

    <div id="syncConnected" class="hidden">
      <p class="sync-desc">把這組同步碼貼到你其他裝置的「輸入同步碼」欄位，兩邊就會自動同步。</p>
      <label class="field">
        <span class="field-label">你的同步碼（請妥善保存，知道這組碼的人都能看到/修改資料）</span>
        <input type="text" id="syncKeyDisplay" readonly>
      </label>
      <button type="button" id="copySyncBtn" class="btn btn-secondary" style="width:100%;">
        複製同步碼
      </button>
      <button type="button" id="disconnectSyncBtn" class="btn btn-secondary" style="width:100%; margin-top:8px; color:var(--red);">
        停止同步（僅保留本機資料）
      </button>
    </div>
  </div>

  <div class="dialog-footer">
    <button type="button" id="closeSyncDialogBtn2" class="btn btn-primary">完成</button>
  </div>
</dialog>

<div id="actionSheetOverlay" class="action-sheet-overlay hidden">
  <div id="actionSheet" class="action-sheet">
    <button id="editActionBtn" class="action-sheet-item">編輯</button>
    <button id="deleteActionBtn" class="action-sheet-item danger">刪除</button>
    <button id="cancelActionBtn" class="action-sheet-item cancel">取消</button>
  </div>
</div>

<div id="toast" class="toast hidden"></div>

<script type="module" src="app.js"></script>
</body>
</html>

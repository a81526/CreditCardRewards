<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Credit Card Rewards</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#111;background:#fff}header{height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-bottom:1px solid #eee;position:sticky;top:0;background:#fff}.container{max-width:900px;margin:auto;padding:20px}button{border:0;border-radius:12px;padding:10px 14px;background:#111;color:#fff}input{width:100%;padding:14px;border:1px solid #eaeaea;border-radius:16px;font-size:16px}.item{background:#fafafa;border:1px solid #eaeaea;border-radius:16px;padding:16px;margin-top:12px}.rate{font-size:22px;font-weight:700}.small{color:#666;font-size:14px}
</style>
</head>
<body>
<header><b>Credit Card Rewards</b><button onclick="addReward()">＋新增活動</button></header>
<div class="container"><input id="search" placeholder="搜尋銀行、卡片、分類、備註" oninput="render()"><div id="app"></div></div>
<script>
let rewards=JSON.parse(localStorage.getItem('rewards')||'[]');
function save(){localStorage.setItem('rewards',JSON.stringify(rewards))}
function addReward(){let card=prompt('信用卡名稱');if(!card)return;let category=prompt('分類');let cashback=Number(prompt('回饋%'));let note=prompt('備註');rewards.push({id:Date.now(),cardName:card,category,cashback,note});save();render()}
function render(){let k=document.getElementById('search').value.toLowerCase();let d=rewards.filter(r=>JSON.stringify(r).toLowerCase().includes(k));document.getElementById('app').innerHTML=d.map(r=>`<div class="item"><b>${r.cardName}</b><div class="small">${r.category}<br>${r.note||''}</div><div class="rate">${r.cashback}%</div></div>`).join('')||'<p class="small">目前沒有優惠資料</p>'}
render();
</script>
</body>
</html>
